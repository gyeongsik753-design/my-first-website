<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>경식의 첫 번째 웹사이트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #1e293b; border-radius: 16px; padding: 48px 40px; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
    .avatar { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 1.8rem; margin-bottom: 8px; color: #38bdf8; }
    .subtitle { color: #94a3b8; margin-bottom: 24px; font-size: 0.95rem; }
    p { line-height: 1.7; color: #cbd5e1; margin-bottom: 24px; }
    .badge { display: inline-block; background: #0ea5e9; color: #fff; padding: 6px 16px; border-radius: 999px; font-size: 0.8rem; margin: 4px; }
    .footer { margin-top: 32px; color: #475569; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <h1>안녕하세요, 경식입니다!</h1>
    <p class="subtitle">웹 개발을 공부하고 있는 신경식입니다</p>
    <p>Claude Code와 함께 바이브 코딩을 배우며<br>나만의 웹사이트를 만들어가고 있습니다.</p>
    <div>
      <span class="badge">HTML</span>
      <span class="badge">GitHub</span>
      <span class="badge">바이브 코딩</span>
    </div>
    <div class="footer">🚀 GitHub Pages로 배포됨</div>
  </div>
</body>
</html>
